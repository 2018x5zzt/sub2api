services:
  enterprise-bff:
    build:
      context: ../backend
      dockerfile: Dockerfile.enterprise-bff
    container_name: sub2api-enterprise-bff
    restart: unless-stopped
    ports:
      - "${ENTERPRISE_BFF_BIND_HOST:-0.0.0.0}:${ENTERPRISE_BFF_PORT:-8090}:8090"
    environment:
      - ENTERPRISE_BFF_HOST=0.0.0.0
      - ENTERPRISE_BFF_PORT=8090
      - ENTERPRISE_BFF_CORE_BASE_URL=${ENTERPRISE_BFF_CORE_BASE_URL:-http://sub2api:8080/api/v1}
      - ENTERPRISE_BFF_REQUEST_TIMEOUT_SECONDS=${ENTERPRISE_BFF_REQUEST_TIMEOUT_SECONDS:-30}
      - ENTERPRISE_BFF_TRUSTED_PROXIES=${ENTERPRISE_BFF_TRUSTED_PROXIES:-}
      - ENTERPRISE_BFF_ENTERPRISE_ATTRIBUTE_KEY=${ENTERPRISE_BFF_ENTERPRISE_ATTRIBUTE_KEY:-enterprise_name}
      - ENTERPRISE_BFF_ENTERPRISE_DISPLAY_NAME_ATTRIBUTE_KEY=${ENTERPRISE_BFF_ENTERPRISE_DISPLAY_NAME_ATTRIBUTE_KEY:-enterprise_display_name}
      - ENTERPRISE_BFF_ENTERPRISE_SUPPORT_CONTACT_ATTRIBUTE_KEY=${ENTERPRISE_BFF_ENTERPRISE_SUPPORT_CONTACT_ATTRIBUTE_KEY:-enterprise_support_contact}
      - ENTERPRISE_BFF_VISIBLE_GROUP_IDS_BY_ENTERPRISE=${ENTERPRISE_BFF_VISIBLE_GROUP_IDS_BY_ENTERPRISE:-}
      - DATA_DIR=/app/data
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
      - DATABASE_SSLMODE=disable
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-10}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-5}
      - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      sub2api:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
