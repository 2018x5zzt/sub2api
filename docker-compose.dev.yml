# =============================================================================
# Sub2API Local Dev Infrastructure
# =============================================================================
# Only PostgreSQL + Redis for local development (backend/frontend run natively)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
# =============================================================================

services:
  postgres:
    image: postgres:18-alpine
    container_name: sub2api-dev-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - sub2api-pg-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: sub2api
      POSTGRES_PASSWORD: sub2api
      POSTGRES_DB: sub2api
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api -d sub2api"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis:
    image: redis:8-alpine
    container_name: sub2api-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sub2api-redis-data:/data
    command: redis-server --save 60 1 --appendonly yes
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

volumes:
  sub2api-pg-data:
  sub2api-redis-data:
